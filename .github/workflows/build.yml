name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-python:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./displayAnalyzer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build displayAnalyzer
        working-directory: ./displayAnalyzer
        run: |
          pyinstaller --onefile --noconsole --name displayAnalyzer main.py

      - name: Upload analyzer artifact
        uses: actions/upload-artifact@v4
        with:
          name: displayAnalyzer-exe
          path: ./displayAnalyzer/dist/displayAnalyzer.exe
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build-python
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download analyzer artifact
        uses: actions/download-artifact@v5
        with:
          name: displayAnalyzer-exe
          path: ./displayAnalyzer/dist

      - name: Verify analyzer artifact
        run: ls -la ./displayAnalyzer/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Run Tests
        working-directory: ./backend
        run: go test -v ./...

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: check --config .goreleaser.yaml

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
