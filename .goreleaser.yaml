version: 2

project_name: agg-league-overlay

builds:
  - dir: backend
    main: ./cmd/league-spectator/main.go
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - darwin
    goarch:
      - arm64
      - amd64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - src: ./frontend/*
      - src: ./clientOverlay/*
        # the python script is build in pwsh so .exe
      - src: ./displayAnalyzer/dist/displayAnalyzer.exe
      - src: ./config.toml

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
