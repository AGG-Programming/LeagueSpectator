<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Client Stream Overlay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay-container">
        
        <!-- LINKER BEREICH: Client Box & Infos direkt darunter -->
        <div class="main-content-left">
            <!-- Die LoL Client Box (1280x720) -->
            <div class="client-capture-zone">
                <!-- Hier drunter schneidet OBS später den Client ein -->
            </div>

            <!-- INFOBAR: Direkt unter dem Client-Rahmen -->
            <div class="bottom-info-bar">
                <!-- TikTok Sektion -->
                <div class="social-container">
                    <img src="assets/images/tiktok_apps_platform_icon_176035.png" alt="TikTok" class="social-icon">
                    <span class="social-handle">AGG_LoL</span>
                </div>
            </div>

            <!-- Platzhalter für das OBS-interne OP.GG Widget (Unter den Texten) -->
            <div class="opgg-widget-placeholder"></div>
        </div>

        <!-- RECHTE SEITE: Branding, Standings & Logo -->
        <div class="sidebar-right">
            <!-- 1. Ganz oben: Always Good Games -->
            <div class="brand-top">
                <img src="assets/images/Logo-removebg-preview.png" alt="AGG Mini Logo" class="mini-logo">
                <span class="brand-text">Always Good Games</span>
            </div>

            <!-- 2. Ganz unten: Das riesige teiltransparente Logo -->
            <div class="large-logo-container">
                <img src="assets/images/Logo-removebg-preview.png" alt="AGG Large Logo" class="large-logo">
            </div>
        </div>

    </div>

</body>
</html>
