<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Custom Spectator HUD</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="hud-container">
        <div id="league-standings-box">
            <div class="box-header">
                <h3>PRIME LEAGUE - GRUPPE 7.23</h3>
            </div>
            <table class="standings-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Team</th>
                        <th>W-L</th>
                        <th>Pts</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="pos-cell">1</td>
                        <td class="team-cell">
                            <img src="assets/images/team-logos/Logo-removebg-preview.png" alt="" class="team-logo">
                            <span class="name-text">LES</span>
                        </td>
                        <td class="wl-cell">5 - 0</td>
                        <td class="pts-cell">15</td>
                    </tr>
                    <tr class="own-team">
                        <td class="pos-cell">2</td>
                        <td class="team-cell">
                            <img src="assets/images/team-logos/Logo-removebg-preview.png" alt="" class="team-logo">
                            <span class="name-text">AGG</span>
                        </td>
                        <td class="wl-cell">4 - 1</td>
                        <td class="pts-cell">13</td>
                    </tr>
                    <tr>
                        <td class="pos-cell">3</td>
                        <td class="team-cell">
                            <img src="assets/images/team-logos/Logo-removebg-preview.png" alt="" class="team-logo">
                            <span class="name-text">RR</span>
                        </td>
                        <td class="wl-cell">3 - 2</td>
                        <td class="pts-cell">9</td>
                    </tr>
                    <tr class="table-gap">
                        <td colspan="5"><div></div></td>
                    </tr> 
                    <tr class="enemy-team">
                        <td class="pos-cell">8</td>
                        <td class="team-cell">
                            <img src="assets/images/team-logos/Logo-removebg-preview.png" alt="" class="team-logo">
                            <span class="name-text">W2B</span>
                        </td>
                        <td class="wl-cell">0 - 5</td>
                        <td class="pts-cell">0</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div id="score-display">
        <div class="main-score-display">
            <div class="team-side blue-side">
                <div class="series-ticks">
                    <div class="tick active"></div>
                    <div class="tick"></div>
                </div>
                <img src="assets/images/team-logos/Logo-removebg-preview.png" alt="" class="score-team-logo">
                <div class="team-meta">
                    <span class="team-name">AGG</span>
                    <span class="team-record">3-2</span>
                </div>
                <div class="team-gold-container">
                    <span class="team-gold">23.4K</span>
                    <span class="gold-lead">+1.4K</span>
                </div>
                <div class="kill-score blue-kills">12</div>
            </div>

            <div class="center-info">
                <div class="league-title">PL</div>
                <div class="league-sub">Div7 Bo3</div>
            </div>

            <div class="team-side red-side">
                <div class="kill-score red-kills">8</div>
                <div class="team-gold-container">
                    <span class="team-gold">21.8K</span>
                    <span class="gold-lead hidden">+0.0K</span>
                </div>
                <div class="team-meta">
                    <span class="team-name">LES</span>
                    <span class="team-record">1-4</span>
                </div>
                <img src="assets/images/team-logos/Logo-removebg-preview.png" alt="" class="score-team-logo">
                <div class="series-ticks">
                    <div class="tick"></div>
                    <div class="tick"></div>
                </div>
            </div>
        </div>

        <div class="sub-score-display">
            <div class="objectives blue-objectives">
                <div class="obj-item blue-towers">
                    <img src="assets/images/ui/cloud-drake.png" alt="T">
                    <span class="obj-count">5</span>
                </div>
                <div class="obj-item blue-grubs">
                    <img src="assets/images/ui/cloud-drake.png" alt="G">
                    <span class="obj-count">3</span>
                </div>
                <div class="drakes-list blue-drakes">
                    <img src="assets/images/ui/infernal-drake.png" class="drake-icon" alt="I">
                    <img src="assets/images/ui/ocean-drake.png" class="drake-icon" alt="O">
                </div>
            </div>

            <div class="game-time">18:42</div>

            <div class="objectives red-objectives">
                <div class="drakes-list red-drakes">
                    <img src="assets/images/ui/infernal-drake.png" class="drake-icon" alt="I">
                </div>
                <div class="obj-item red-grubs">
                    <span class="obj-count">0</span>
                    <img src="assets/images/ui/cloud-drake.png" alt="G">
                </div>
                <div class="obj-item red-towers">
                    <span class="obj-count">1</span>
                    <img src="assets/images/ui/cloud-drake.png" alt="T">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
